<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zentora Bronlash</title>
    <style>
        :root { --primary: #1a1a1a; --secondary: #27ae60; --blue: #3498db; }
        body { 
            font-family: -apple-system, sans-serif; 
            margin: 0; 
            background-color: #f0f0f0;
            /* LOGO YO'LI TO'G'RILANDI: .jpg formatiga o'tkazildi */
            background-image: url('logo/Logo.jpg'); 
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center 30%;
            background-size: 180px auto;
        }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(240, 240, 240, 0.9); z-index: -1;
        }
        .container { width: 100%; max-width: 450px; margin: 0 auto; background: white; min-height: 100vh; padding: 15px; box-sizing: border-box; }
        
        .lang-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .lang-bar span { cursor: pointer; font-size: 14px; font-weight: bold; color: #777; padding: 8px 12px; border-radius: 6px; }
        .lang-bar span.active { color: white; background: var(--primary); }

        .logo-img { width: 130px; display: block; margin: 0 auto 20px; }
        
        section { display: none; }
        section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .house-preview { width: 100%; border-radius: 15px; margin-bottom: 10px; display: block; }
        .gallery img { width: 100%; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .btn { display: block; color: white; padding: 16px; text-decoration: none; border-radius: 12px; margin: 10px 0; font-weight: bold; text-align: center; border: none; font-size: 16px; width: 100%; box-sizing: border-box; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .btn-dark { background: var(--primary); }
        .btn-green { background: var(--secondary); }
        .btn-blue { background: var(--blue); }
        .btn-back { background: #95a5a6; }

        .payment-box { border: 2px dashed #e74c3c; padding: 20px; background: #fff5f5; border-radius: 12px; margin: 15px 0; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-bar">
        <span id="btn-uz" class="active" onclick="changeLang('uz')">UZ</span>
        <span id="btn-ru" onclick="changeLang('ru')">RU</span>
        <span id="btn-en" onclick="changeLang('en')">EN</span>
    </div>

    <img src="logo/Logo.jpg" alt="Zentora Logo" class="logo-img">

    <section id="home" class="active">
        <h2 id="title-main">Uylarimiz</h2>
        <div style="margin-bottom: 25px;">
            <img src="zentoraimages1/1.jpg" class="house-preview">
            <button onclick="showPage('uy1')" class="btn btn-dark" id="btn-view1">1-uyni ko'rish</button>
        </div>
        <div style="margin-bottom: 25px;">
            <img src="zentoraimages2/2.jpg" class="house-preview">
            <button onclick="showPage('uy2')" class="btn btn-dark" id="btn-view2">2-uyni ko'rish</button>
        </div>
    </section>

    <section id="uy1">
        <h2 id="title-uy1">1-uy galereyasi</h2>
        <div class="gallery">
            <img src="zentoraimages1/1.jpg">
            <img src="zentoraimages1/1 (2).jpg">
            <img src="zentoraimages1/1 (3).jpg">
            <img src="zentoraimages1/1 (4).jpg">
            <img src="zentoraimages1/1 (5).jpg">
            <img src="zentoraimages1/1 (6).jpg">
            <img src="zentoraimages1/1 (7).jpg">
            <img src="zentoraimages1/1 (8).jpg">
            <img src="zentoraimages1/1 (9).jpg">
            <img src="zentoraimages1/1 (10).jpg">
        </div>
        <a href="https://yandex.uz/maps/-/CPgy4T35" target="_blank" class="btn btn-blue" id="btn-loc1">📍 Uy lokatsiyasi</a>
        <button onclick="showPage('payment')" class="btn btn-green" id="btn-bron1">⚡️ Bronlash</button>
        <button onclick="showPage('home')" class="btn btn-back" id="btn-back1">⬅️ Orqaga</button>
    </section>

    <section id="uy2">
        <h2 id="title-uy2">2-uy galereyasi</h2>
        <div class="gallery">
            <img src="zentoraimages2/2.jpg">
            <img src="zentoraimages2/2 (2).jpg">
            <img src="zentoraimages2/2 (3).jpg">
            <img src="zentoraimages2/2 (4).jpg">
            <img src="zentoraimages2/2 (5).jpg">
            <img src="zentoraimages2/2 (6).jpg">
            <img src="zentoraimages2/2 (7).jpg">
            <img src="zentoraimages2/2 (8).jpg">
            <img src="zentoraimages2/2 (9).jpg">
            <img src="zentoraimages2/2 (10).jpg">
        </div>
        <a href="https://yandex.uz/maps/-/CPgy461R" target="_blank" class="btn btn-blue" id="btn-loc2">📍 Uy lokatsiyasi</a>
        <button onclick="showPage('payment')" class="btn btn-green" id="btn-bron2">⚡️ Bronlash</button>
        <button onclick="showPage('home')" class="btn btn-back" id="btn-back2">⬅️ Orqaga</button>
    </section>

    <section id="payment">
        <h2 id="title-pay">To'lov</h2>
        <div class="payment-box">
            <p id="pay-text">Band qilish uchun 50% avans to'lovi zarur.</p>
            <h3 style="color: #e74c3c; font-size: 20px;">5614 6814 2844 1483</h3>
            <p><strong>Axmedov Shaxzod</strong></p>
        </div>
        <a href="https://t.me/Sh_Axmedov_F" class="btn btn-green" id="btn-tg">🤖 Telegram orqali yuborish</a>
        <button onclick="showPage('home')" class="btn btn-back" id="btn-home">🏠 Bosh sahifa</button>
    </section>
</div>

<script>
    const langData = {
        uz: { main: "Uylarimiz", view: "Ko'rish", loc: "📍 Uy lokatsiyasi", bron: "⚡️ Bronlash", back: "⬅️ Orqaga", pay: "To'lov", payText: "Band qilish uchun 50% avans zarur.", tg: "🤖 Telegram orqali yuborish", home: "🏠 Bosh sahifa" },
        ru: { main: "Наши дома", view: "Смотреть", loc: "📍 Локация дома", bron: "⚡️ Бронировать", back: "⬅️ Назад", pay: "Оплата", payText: "Для бронирования нужен аванс 50%.", tg: "🤖 Отправить в Telegram", home: "🏠 Главная" },
        en: { main: "Our houses", view: "View", loc: "📍 Location", bron: "⚡️ Book Now", back: "⬅️ Back", pay: "Payment", payText: "50% advance is required.", tg: "🤖 Send via Telegram", home: "🏠 Home" }
    };

    function changeLang(lang) {
        document.querySelectorAll('.lang-bar span').forEach(s => s.classList.remove('active'));
        document.getElementById('btn-' + lang).classList.add('active');
        document.getElementById('title-main').innerText = langData[lang].main;
        document.getElementById('btn-view1').innerText = langData[lang].view;
        document.getElementById('btn-view2').innerText = langData[lang].view;
        document.getElementById('title-uy1').innerText = langData[lang].main;
        document.getElementById('title-uy2').innerText = langData[lang].main;
        document.querySelectorAll('[id^="btn-loc"]').forEach(el => el.innerText = langData[lang].loc);
        document.querySelectorAll('[id^="btn-bron"]').forEach(el => el.innerText = langData[lang].bron);
        document.querySelectorAll('[id^="btn-back"]').forEach(el => el.innerText = langData[lang].back);
        document.getElementById('title-pay').innerText = langData[lang].pay;
        document.getElementById('pay-text').innerText = langData[lang].payText;
        document.getElementById('btn-tg').innerText = langData[lang].tg;
        document.getElementById('btn-home').innerText = langData[lang].home;
    }

    function showPage(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
