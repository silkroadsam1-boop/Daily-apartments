<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentora Bronlash</title>
    <style>
        :root { --primary: #1a1a1a; --secondary: #27ae60; --blue: #3498db; }
        body { font-family: sans-serif; margin: 0; background-color: #f0f0f0; padding-bottom: 50px; }
        .container { max-width: 450px; margin: 0 auto; background: white; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .logo { width: 120px; margin: 20px auto; display: block; }
        .house-preview { width: 100%; border-radius: 15px; margin-bottom: 10px; }
        .gallery img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
        .btn { display: block; color: white; padding: 15px; text-decoration: none; border-radius: 10px; margin: 10px 0; font-weight: bold; text-align: center; border: none; font-size: 16px; cursor: pointer; width: 100%; }
        .btn-dark { background: var(--primary); }
        .btn-green { background: var(--secondary); }
        .btn-blue { background: var(--blue); }
        .btn-back { background: #95a5a6; }
        section { display: none; }
        section.active { display: block; }
    </style>
</head>
<body>
<div class="container">
    <img src="logotip/Logo.jpg" alt="Logo" class="logo">

    <section id="home" class="active">
        <h2>Uylarimiz</h2>
        <div style="margin-bottom: 30px;">
            <img src="zentora%20tasvirlar1/1.jpg" class="house-preview">
            <button onclick="showPage('uy1')" class="btn btn-dark">1-uyni ko'rish</button>
        </div>
        <div style="margin-bottom: 30px;">
            <img src="zentora%20tasvirlar2/2.jpg" class="house-preview">
            <button onclick="showPage('uy2')" class="btn btn-dark">2-uyni ko'rish</button>
        </div>
    </section>

    <section id="uy1">
        <h2>1-uy rasmlari</h2>
        <div class="gallery">
            <img src="zentora%20tasvirlar1/1.jpg">
            <img src="zentora%20tasvirlar1/1%20(2).jpg">
            <img src="zentora%20tasvirlar1/1%20(3).jpg">
        </div>
        <button onclick="showPage('home')" class="btn btn-back">⬅️ Orqaga</button>
    </section>

    <section id="uy2">
        <h2>2-uy rasmlari</h2>
        <div class="gallery">
            <img src="zentora%20tasvirlar2/2.jpg">
            <img src="zentora%20tasvirlar2/2%20(2).jpg">
            <img src="zentora%20tasvirlar2/2%20(3).jpg">
        </div>
        <button onclick="showPage('home')" class="btn btn-back">⬅️ Orqaga</button>
    </section>
</div>

<script>
    function showPage(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
